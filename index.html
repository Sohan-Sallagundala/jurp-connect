<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bat-Connect</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script defer src="js/client.js?v=final_sync"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Access Channel</h2>
            <input type="text" id="groupName" placeholder="Channel Name">
            <input type="text" id="username" placeholder="Your Name">
            <input type="password" id="password" placeholder="Channel Key">
            <button onclick="login()">Initialize Connection</button>
        </div>
    </div>

    <nav>
        <h1>Encrypted_Channel_v2</h1>
    </nav>

    <div class="container"></div>

    <div class="send">
        <form action="#" id="send-container">
            <label for="fileInp" id="file-label">📎</label>
            <input type="file" id="fileInp" style="display:none;">
            <input type="text" name="messageInp" id="messageInp" placeholder="Send encrypted transmission...">
            <button class="btn" type="submit">Send</button>
        </form>
    </div>
</body>
</html>
