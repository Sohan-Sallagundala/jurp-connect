<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat Connect</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Access Channel</h2>
            <input type="text" id="groupName" placeholder="Group Name">
            <input type="text" id="username" placeholder="Your Name">
            <input type="password" id="password" placeholder="Key">
            <button onclick="login()">Initialize Connection</button>
        </div>
    </div>

    <nav><h1>Encrypted_Channel_v2</h1></nav>
    <div class="container" id="message-container"></div>

    <div class="send">
        <form action="#" id="send-container">
            <input type="text" id="messageInp" placeholder="Send transmission...">
            <button class="btn" type="submit">Send</button>
        </form>
    </div>

    <script src="js/client.js"></script>
</body>
</html>
